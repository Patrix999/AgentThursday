<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <!-- M7.1 Card 80: interactive-widget=resizes-content asks the browser to
         shrink the layout viewport when the on-screen keyboard appears, so
         100dvh + safe-area work correctly on iOS Safari and Chrome Android. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AgentThursday" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>AgentThursday workspace</title>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
